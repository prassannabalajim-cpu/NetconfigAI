version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: netconfig_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: netconfig_diff_db
      POSTGRES_USER: netconfig_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NetConfig@Secure2024!}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netconfig_user -d netconfig_diff_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netconfig_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7.4-alpine
    container_name: netconfig_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-RedisNetConfig2024!}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-RedisNetConfig2024!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netconfig_network

  # FastAPI Application Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:NetConfig%40Secure2024!@db:5432/netconfig_diff_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production-minimum-32-chars!}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: '["*"]'
      ALLOWED_HOSTS: '["*"]'
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-25}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_NUM_GPU: ${OLLAMA_NUM_GPU:-0}
    volumes:
      - uploads_data:/tmp/uploads
      - reports_data:/tmp/reports
      - ./backend:/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - netconfig_network

  # Celery Background Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_celery_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:NetConfig%40Secure2024!@db:5432/netconfig_diff_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key-in-production-minimum-32-chars!}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-25}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_NUM_GPU: ${OLLAMA_NUM_GPU:-0}
    volumes:
      - uploads_data:/tmp/uploads
      - reports_data:/tmp/reports
      - ./backend:/app
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - netconfig_network

  # Celery Scheduler (Beat)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_celery_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-RedisNetConfig2024!}@redis:6379/0"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - netconfig_network

  # Alembic Auto Migration Container
  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netconfig_migrate
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://netconfig_user:NetConfig%40Secure2024!@db:5432/netconfig_diff_db"
    networks:
      - netconfig_network
    restart: "no"

  # Frontend (React/Vite production build served by Nginx)
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: netconfig_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - netconfig_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  reports_data:

networks:
  netconfig_network:
    driver: bridge
